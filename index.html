<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bayy.ty — Maintenance</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: linear-gradient(180deg, #ffffff, #f5fdf8);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    color: #0A2E17;
  }

  .card {
    background: white;
    border-radius: 20px;
    padding: 40px 28px;
    max-width: 520px;
    width: 100%;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    border: 1px solid rgba(0,200,83,0.15);
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 34px;
    margin-bottom: 12px;
  }

  h1 span {
    color: #00C853;
  }

  p {
    font-size: 15px;
    color: #2D6B44;
    line-height: 1.6;
    margin-bottom: 24px;
  }

  .input-row {
    display: flex;
    gap: 8px;
  }

  input {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 14px;
  }

  button {
    background: #00C853;
    color: white;
    border: none;
    padding: 12px 16px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
  }

  .success {
    display: none;
    margin-top: 12px;
    font-size: 14px;
    color: #007A30;
  }

  .footer {
    margin-top: 18px;
    font-size: 12px;
    color: #9ABFAB;
  }

  @media(max-width: 500px) {
    .input-row {
      flex-direction: column;
    }

    button {
      width: 100%;
    }
  }
</style>
</head>

<body>

<div class="card">

  <h1>We’re unlocking <br><span>something better</span></h1>

  <p>
    bayy.ty is temporarily offline as we upgrade the platform.<br>
    Better listings, smarter search, and a smoother experience <strong>across Egypt</strong> are coming soon.
  </p>

  <div class="input-row">
    <input type="email" id="email" placeholder="Enter your email">
    <button onclick="join()">Notify Me</button>
  </div>

  <div class="success" id="success">
    ✓ You’re on the list. We’ll notify you once we’re live.
  </div>

  <div class="footer">
    Contact: hello@bayyty.com
  </div>

</div>

<script>
function join() {
  const emailInput = document.getElementById('email');
  const success = document.getElementById('success');
  const email = emailInput.value.trim();

  if (!email || !email.includes('@')) {
    emailInput.style.borderColor = 'red';
    return;
  }

  // Save locally
  let list = JSON.parse(localStorage.getItem('bayyty_emails') || '[]');
  list.push(email);
  localStorage.setItem('bayyty_emails', JSON.stringify(list));

  // Optional: open email client (backup)
  window.location.href = `mailto:hello@bayyty.com?subject=Notify Me&body=${email}`;

  emailInput.style.display = 'none';
  document.querySelector('button').style.display = 'none';
  success.style.display = 'block';
}
</script>

</body>
</html>
